name: Quality gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  quality:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        shell: bash
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Test
        shell: bash
        run: go test ./... -count=1

      - name: Test with race detector
        shell: bash
        run: go test -race ./... -count=1

      - name: Vet
        shell: bash
        run: go vet ./...

      - name: Build local binary
        shell: bash
        run: sh scripts/build.sh

      - name: Version smoke
        shell: bash
        run: |
          set -euo pipefail
          ./build/javdb version
          ./build/javdb version --json | tee /tmp/javdb-version.json
          python3 - <<'PY'
          import json
          data = json.load(open('/tmp/javdb-version.json'))
          assert data['version'], data
          print('version ok:', data['version'])
          PY

      - name: Test release packaging and workflow policy
        shell: bash
        run: |
          sh scripts/test-package-release.sh
          sh scripts/test-homebrew-formula.sh
          sh scripts/test-workflows.sh

      - name: Run pre-commit checks
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check pre-commit==4.6.0
          python -m pre_commit run --all-files

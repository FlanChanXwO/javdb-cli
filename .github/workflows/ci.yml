name: Quality gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  quality:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        shell: bash
        run: go test ./... -count=1

      - name: Test with race detector
        shell: bash
        run: go test -race ./... -count=1

      - name: Vet
        shell: bash
        run: go vet ./...

      - name: Build local binary
        shell: bash
        run: sh scripts/build.sh

      - name: Version smoke
        shell: bash
        run: |
          set -euo pipefail
          ./build/javdb version
          ./build/javdb version --json | tee /tmp/javdb-version.json
          # JSON must include a version field (dev or vX.Y.Z)
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/javdb-version.json"))
          assert "version" in data and data["version"], data
          print("version ok:", data["version"])
          PY

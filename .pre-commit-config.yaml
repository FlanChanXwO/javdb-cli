repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: sh -c 'test -z "$(gofmt -l "$@")"' --
        language: system
        types: [go]
      - id: go-test
        name: go test ./...
        entry: go test ./...
        language: system
        pass_filenames: false
      - id: release-tooling
        name: release tooling checks
        entry: sh scripts/test-workflows.sh
        language: system
        pass_filenames: false
